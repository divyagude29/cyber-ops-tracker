{% extends "base.html" %}
{% block content %}

<h2 class="mb-3">Risk Register</h2>

<div class="card shadow-sm mb-4">
  <div class="card-header bg-white fw-semibold">Add Risk</div>
  <div class="card-body">
    <form method="POST" action="{{ url_for('add_risk') }}">
      <div class="row g-3">
        <div class="col-md-4">
          <label class="form-label">Title</label>
          <input class="form-control" name="title" required>
        </div>
        <div class="col-md-2">
          <label class="form-label">Severity</label>
          <select class="form-select" name="severity">
            <option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
          </select>
        </div>
        <div class="col-md-3">
          <label class="form-label">Owner</label>
          <input class="form-control" name="owner" required>
        </div>
        <div class="col-md-3">
          <label class="form-label">Due Date</label>
          <input class="form-control" type="date" name="due_date">
        </div>
        <div class="col-md-2">
          <label class="form-label">Status</label>
          <select class="form-select" name="status">
            <option>Open</option><option>In Progress</option><option>Closed</option>
          </select>
        </div>
        <div class="col-md-10">
          <label class="form-label">Notes</label>
          <input class="form-control" name="notes" placeholder="short notes or mitigation plan">
        </div>
      </div>
      <button class="btn btn-primary mt-3">Add Risk</button>
    </form>
  </div>
</div>

<div class="card shadow-sm">
  <div class="card-header bg-white fw-semibold">All Risks</div>
  <div class="card-body table-responsive">
    <table class="table table-bordered table-hover align-middle">
      <thead>
        <tr>
          <th>ID</th><th>Title</th><th>Severity</th><th>Owner</th><th>Due</th><th>Status</th><th width="90">Action</th>
        </tr>
      </thead>
      <tbody>
        {% for r in risks %}
        <tr>
          <td>{{ r.id }}</td>
          <td>{{ r.title }}</td>
          <td>{{ r.severity }}</td>
          <td>{{ r.owner }}</td>
          <td>{{ r.due_date or "-" }}</td>
          <td>{{ r.status }}</td>
          <td>
            <form method="POST" action="{{ url_for('delete_risk', item_id=r.id) }}" onsubmit="return confirm('Delete this risk?');">
              <button class="btn btn-sm btn-outline-danger">Delete</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr><td colspan="7" class="text-muted text-center">No risks yet.</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>

{% endblock %}
